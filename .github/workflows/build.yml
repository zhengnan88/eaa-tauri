name: Build Windows Portable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build Tauri app
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Package portable exe
        run: |
          Compress-Archive -Path src-tauri/target/x86_64-pc-windows-msvc/release/eaa-tauri.exe -DestinationPath EAA_${{ github.ref_name }}_x64_portable.zip
        shell: pwsh

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: EAA-${{ github.ref_name }}-windows-x64-portable
          path: EAA_*_portable.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: EAA_*_portable.zip
